name: Build and publish image

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: '17 2 * * *'

env:
  IMAGE_NAME: ghcr.io/italypaleale/restic-rclone

permissions:
  contents: read
  packages: write

jobs:
  detect:
    name: Detect versions and decide whether to build
    runs-on: ubuntu-latest
    outputs:
      build_required: ${{ steps.decide.outputs.build_required }}
      restic_version: ${{ steps.versions.outputs.restic_version }}
      rclone_version: ${{ steps.versions.outputs.rclone_version }}
      alpine_digest: ${{ steps.alpine.outputs.alpine_digest }}
      combo_tag: ${{ steps.versions.outputs.combo_tag }}
    steps:
      - name: Resolve latest restic and rclone versions
        id: versions
        run: |
          set -euo pipefail
          restic_version="$(curl -fsSL https://api.github.com/repos/restic/restic/releases/latest | jq -r '.tag_name | ltrimstr("v")')"
          rclone_version="$(curl -fsSL https://api.github.com/repos/rclone/rclone/releases/latest | jq -r '.tag_name | ltrimstr("v")')"
          combo_tag="${restic_version}:${rclone_version}"

          echo "restic_version=${restic_version}" >> "$GITHUB_OUTPUT"
          echo "rclone_version=${rclone_version}" >> "$GITHUB_OUTPUT"
          echo "combo_tag=${combo_tag}" >> "$GITHUB_OUTPUT"

      - name: Resolve alpine manifest digest
        id: alpine
        run: |
          set -euo pipefail
          alpine_digest="$(docker buildx imagetools inspect alpine:latest | awk '$1 == "Digest:" { print $2; exit }')"
          echo "$alpine_digest" | grep -Eq '^sha256:[0-9a-f]{64}$'
          echo "alpine_digest=${alpine_digest}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Decide whether to build
        id: decide
        env:
          COMBO_TAG: ${{ steps.versions.outputs.combo_tag }}
          ALPINE_DIGEST: ${{ steps.alpine.outputs.alpine_digest }}
        run: |
          set -euo pipefail
          image="${IMAGE_NAME}:${COMBO_TAG}"

          if docker pull "$image" >/dev/null 2>&1; then
            existing_base_digest="$(docker inspect "$image" --format '{{ index .Config.Labels "org.opencontainers.image.base.digest" }}')"
            if [ "$existing_base_digest" = "$ALPINE_DIGEST" ]; then
              echo "Image already exists with same alpine digest; skipping build"
              echo "build_required=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "Image exists but alpine digest changed (${existing_base_digest} -> ${ALPINE_DIGEST}); rebuilding"
            echo "build_required=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Image tag does not exist yet; building"
          echo "build_required=true" >> "$GITHUB_OUTPUT"

  build:
    name: Build, test and publish multi-arch image
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.build_required == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: amd64,arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build amd64 image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          push: false
          tags: restic-rclone:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            RESTIC_VERSION=${{ needs.detect.outputs.restic_version }}
            RCLONE_VERSION=${{ needs.detect.outputs.rclone_version }}
            ALPINE_DIGEST=${{ needs.detect.outputs.alpine_digest }}

      - name: Test backup flow in container
        run: |
          set -euo pipefail

          mkdir -p testdata/source testdata/repo
          echo "hello-from-ci" > testdata/source/file.txt

          docker run --rm \
            -e RESTIC_PASSWORD=test-password \
            -v "$PWD/testdata/source:/source" \
            -v "$PWD/testdata/repo:/repo" \
            restic-rclone:test \
            -r /repo init

          docker run --rm \
            -e RESTIC_PASSWORD=test-password \
            -v "$PWD/testdata/source:/source" \
            -v "$PWD/testdata/repo:/repo" \
            restic-rclone:test \
            -r /repo backup /source

          snapshots_output="$(docker run --rm \
            -e RESTIC_PASSWORD=test-password \
            -v "$PWD/testdata/repo:/repo" \
            restic-rclone:test \
            -r /repo snapshots)"

          echo "$snapshots_output"
          echo "$snapshots_output" | grep -q '/source'

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            RESTIC_VERSION=${{ needs.detect.outputs.restic_version }}
            RCLONE_VERSION=${{ needs.detect.outputs.rclone_version }}
            ALPINE_DIGEST=${{ needs.detect.outputs.alpine_digest }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ needs.detect.outputs.combo_tag }}
            ${{ env.IMAGE_NAME }}:${{ needs.detect.outputs.restic_version }}
            ${{ env.IMAGE_NAME }}:latest
