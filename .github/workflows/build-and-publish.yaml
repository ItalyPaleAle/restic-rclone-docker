name: Build and publish image

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ghcr.io/italypaleale/restic-rclone

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build, test and publish multi-arch image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Read versions.json
        id: versions
        run: |
          set -euo pipefail
          restic_version="$(jq -r '.restic' versions.json)"
          rclone_version="$(jq -r '.rclone' versions.json)"
          alpine_digest="$(jq -r '.alpine' versions.json)"
          combo_tag="${restic_version}-${rclone_version}"

          echo "restic_version=${restic_version}" >> "$GITHUB_OUTPUT"
          echo "rclone_version=${rclone_version}" >> "$GITHUB_OUTPUT"
          echo "alpine_digest=${alpine_digest}" >> "$GITHUB_OUTPUT"
          echo "combo_tag=${combo_tag}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: amd64,arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build amd64 image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          push: false
          tags: restic-rclone:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            RESTIC_VERSION=${{ steps.versions.outputs.restic_version }}
            RCLONE_VERSION=${{ steps.versions.outputs.rclone_version }}
            ALPINE_DIGEST=${{ steps.versions.outputs.alpine_digest }}

      - name: Test backup flow in container
        run: |
          set -euo pipefail

          mkdir -p testdata/source testdata/repo
          echo "hello-from-ci" > testdata/source/file.txt

          docker run --rm \
            -e RESTIC_PASSWORD=test-password \
            -v "$PWD/testdata/source:/source" \
            -v "$PWD/testdata/repo:/repo" \
            restic-rclone:test \
            -r /repo init

          docker run --rm \
            -e RESTIC_PASSWORD=test-password \
            -v "$PWD/testdata/source:/source" \
            -v "$PWD/testdata/repo:/repo" \
            restic-rclone:test \
            -r /repo backup /source

          snapshots_output="$(docker run --rm \
            -e RESTIC_PASSWORD=test-password \
            -v "$PWD/testdata/repo:/repo" \
            restic-rclone:test \
            -r /repo snapshots)"

          echo "$snapshots_output"
          echo "$snapshots_output" | grep -q '/source'

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            RESTIC_VERSION=${{ steps.versions.outputs.restic_version }}
            RCLONE_VERSION=${{ steps.versions.outputs.rclone_version }}
            ALPINE_DIGEST=${{ steps.versions.outputs.alpine_digest }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.versions.outputs.combo_tag }}
            ${{ env.IMAGE_NAME }}:${{ steps.versions.outputs.restic_version }}
            ${{ env.IMAGE_NAME }}:latest
